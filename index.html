<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Voo - Vetores 3D</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <div class="cockpit-container">
        <div class="panel">
            <h1>Painel de Voo</h1>
            <p>Ajuste os vetores para pilotar:</p>

            <div class="control-group">
                <label>Modo de Simulação:</label>
                <select id="modoSimulacao">
                    <option value="orientacao">Modo Orientação (Fixo)</option>
                    <option value="voo">Modo Voo Livre (Dinâmico)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Eixo X (Norte / Sul)</label>
                <input type="range" id="sliderX" min="-10" max="10" step="0.1" value="5">
                <span id="valX">5</span>
            </div>

            <div class="control-group">
                <label>Eixo Y (Leste / Oeste)</label>
                <input type="range" id="sliderY" min="-10" max="10" step="0.1" value="0">
                <span id="valY">0</span>
            </div>

            <div class="control-group">
                <label>Eixo Z (Subir / Descer)</label>
                <input type="range" id="sliderZ" min="-10" max="10" step="0.1" value="2">
                <span id="valZ">2</span>
            </div>

            <div class="status-box">
                <h3>Dados de Navegação:</h3>
                <p id="vector-display">Aguardando...</p>
            </div>
            
            <button id="resetBtn" style="margin-top: 20px; padding: 10px; cursor: pointer; background: #444; color: white; border: none; border-radius: 5px;">Resetar Posição</button>
        </div>

        <div id="flight-display"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
